name: Trakt

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Refresh Trakt token
        run: |
          set -o pipefail

          jq --null-input \
              --arg client_id "$TRAKT_CLIENT_ID" \
              --arg client_secret "$TRAKT_CLIENT_SECRET" \
              --arg refresh_token "$TRAKT_REFRESH_TOKEN" \
              '{
                client_id: $client_id,
                client_secret: $client_secret,
                refresh_token: $refresh_token,
                grant_type: "refresh_token"
              }' \
            | curl --silent --show-error --fail-with-body \
                --request POST \
                --header 'Content-Type: application/json' \
                --data-binary @- \
                'https://api.trakt.tv/oauth/token' >token.json

          jq --exit-status '.access_token and .refresh_token' token.json >/dev/null
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REFRESH_TOKEN: ${{ secrets.TRAKT_REFRESH_TOKEN }}

      - name: Update GitHub secrets
        run: |
          jq --raw-output '.refresh_token' token.json | gh secret set --repo "$GH_REPO" --app actions TRAKT_REFRESH_TOKEN
          jq --raw-output '.access_token' token.json | gh secret set --repo "$GH_REPO" --app actions TRAKT_ACCESS_TOKEN
        env:
          GH_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
